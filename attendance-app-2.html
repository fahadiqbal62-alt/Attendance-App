<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Attendance Management</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Syne:wght@600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

/* ══ THEME DEFINITIONS ══ */
:root {
  --font-ui:'Plus Jakarta Sans',sans-serif;
  --font-display:'Syne',sans-serif;
  --font-mono:'DM Mono',monospace;
  /* Midnight (default) */
  --bg:#07090F;--bg2:#0A0C15;--bg3:#0F1119;--bg4:#141827;--bg5:#1A1F2E;
  --bdr:#1E2132;--bdr2:#2A2E40;--bdr3:#353A50;
  --tx:#E8E7DF;--tx2:#B0ADAA;--tx3:#6B6870;--tx4:#3E3C45;
  --acc:#2D5FA8;--acc2:#4A85D4;--acc3:#6AAEF8;
  --g:#15883A;--gl:#3DD668;--gbg:#0A1F10;--gbd:#143820;
  --b:#1B4FD8;--bl:#5B8EF8;--bbg:#0A1230;--bbd:#142060;
  --r:#C42020;--rl:#F06060;--rbg:#200808;--rbd:#3A1010;
  --a:#C07010;--al:#F0A830;--abg:#1A1000;--abd:#2A1800;
  --t:#0A7A56;--tbg:#081F18;--tbd:#0E3020;
  --gr:#8090A8;--grbg:#181C28;--grbd:#202430;
  --adm:#8B5CF6;--admbg:#1A1030;--admbdr:#3D2878;
  --sidebar-w:232px;
  --radius:12px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --transition:.18s cubic-bezier(.4,0,.2,1);
}
[data-theme="ocean"]{
  --bg:#020C18;--bg2:#04111F;--bg3:#061526;--bg4:#0A1C30;--bg5:#0E2438;
  --bdr:#102040;--bdr2:#163050;--bdr3:#1E4060;
  --tx:#D8EEF8;--tx2:#90BEEF;--tx3:#3A7A9A;--tx4:#1A4060;
  --acc:#0075D4;--acc2:#28A8EE;--acc3:#5CCCFF;
  --adm:#00B8D4;--admbg:#001E28;--admbdr:#004860;
}
[data-theme="forest"]{
  --bg:#030D06;--bg2:#051008;--bg3:#07140A;--bg4:#0A1A0D;--bg5:#0E2012;
  --bdr:#122818;--bdr2:#1A3820;--bdr3:#224828;
  --tx:#D8F0DA;--tx2:#80C890;--tx3:#2A6840;--tx4:#143820;
  --acc:#1E7A3A;--acc2:#38B860;--acc3:#60E080;
  --adm:#7AE890;--admbg:#031808;--admbdr:#0A3818;
}
[data-theme="ember"]{
  --bg:#0F0804;--bg2:#150B05;--bg3:#1C0E07;--bg4:#22120A;--bg5:#2A160C;
  --bdr:#38200F;--bdr2:#48280E;--bdr3:#582E0E;
  --tx:#F5E8D0;--tx2:#D4A870;--tx3:#7A4820;--tx4:#40240E;
  --acc:#C84800;--acc2:#F07020;--acc3:#FF9840;
  --adm:#FF8C42;--admbg:#200A00;--admbdr:#4A1800;
}
[data-theme="violet"]{
  --bg:#080610;--bg2:#0C0918;--bg3:#100C20;--bg4:#160F28;--bg5:#1C1332;
  --bdr:#261B40;--bdr2:#322450;--bdr3:#3E2D60;
  --tx:#EAE0FF;--tx2:#B090D8;--tx3:#604890;--tx4:#302048;
  --acc:#5C28C8;--acc2:#8C54F8;--acc3:#B490FF;
  --adm:#C084FF;--admbg:#140A28;--admbdr:#3C1878;
}
[data-theme="light"]{
  --bg:#F0F2F7;--bg2:#FFFFFF;--bg3:#F8F9FC;--bg4:#EDF0F8;--bg5:#E4E8F4;
  --bdr:#D8DCE8;--bdr2:#C8CCDC;--bdr3:#B8BCCC;
  --tx:#1A1D2E;--tx2:#3A3D50;--tx3:#707390;--tx4:#9094B0;
  --acc:#2850CC;--acc2:#4870E8;--acc3:#6090FF;
  --g:#1A7A36;--gl:#22A048;--gbg:#E8F8EE;--gbd:#A8DFB8;
  --b:#1840C8;--bl:#3868E0;--bbg:#E4EDFF;--bbd:#A8C0F0;
  --r:#B82020;--rl:#D84040;--rbg:#FFE8E8;--rbd:#F0B0B0;
  --a:#B06000;--al:#D08020;--abg:#FFF4DC;--abd:#F0C870;
  --adm:#6020B0;--admbg:#F4EEFF;--admbdr:#C0A0E0;
  --shadow:0 2px 16px rgba(0,0,0,.1);
}

/* ══ FONT THEMES ══ */
[data-font="jakarta"] body, [data-font="jakarta"] input, [data-font="jakarta"] select, [data-font="jakarta"] button{font-family:'Plus Jakarta Sans',sans-serif!important;}
[data-font="outfit"] body,[data-font="outfit"] input,[data-font="outfit"] select,[data-font="outfit"] button{font-family:'Outfit',sans-serif!important;}
[data-font="dm"] body,[data-font="dm"] input,[data-font="dm"] select,[data-font="dm"] button{font-family:'DM Sans',sans-serif!important;}
[data-font="mono"] body,[data-font="mono"] input,[data-font="mono"] select,[data-font="mono"] button{font-family:'DM Mono',monospace!important;}
[data-font="space"] body,[data-font="space"] input,[data-font="space"] select,[data-font="space"] button{font-family:'Space Grotesk',sans-serif!important;}

/* ══ SIDEBAR SIZE MODES ══ */
[data-compact="1"] #sidebar{width:64px;}
[data-compact="1"] .sb-logo,.sb-ey,.sb-wm,.sb-clk,.sb-pill,[data-compact="1"] #sb-pill,[data-compact="1"] .sb-ui .sb-name,[data-compact="1"] .nb span:last-child{display:none!important;}
[data-compact="1"] .nb{justify-content:center;padding:11px 0;}
[data-compact="1"] .sb-foot{padding:10px 8px;}
[data-compact="1"] .btn-so{padding:8px;font-size:18px;}
[data-compact="1"] #main-area{margin-left:0;}

body{background:var(--bg);color:var(--tx);font-family:var(--font-ui);min-height:100vh;overflow-x:hidden;transition:background var(--transition),color var(--transition);}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px;}
::-webkit-scrollbar-thumb:hover{background:var(--bdr3);}
input,select,button,textarea{font-family:inherit;}
input[type=date]::-webkit-calendar-picker-indicator,input[type=time]::-webkit-calendar-picker-indicator{filter:invert(.25);}
select option{background:var(--bg3);}

/* ══ ANIMATIONS ══ */
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes slideInRight{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes countUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes ringPulse{0%{box-shadow:0 0 0 0 rgba(74,133,212,.4)}70%{box-shadow:0 0 0 8px rgba(74,133,212,0)}100%{box-shadow:0 0 0 0 rgba(74,133,212,0)}}

.pg.on > *{animation:fadeInUp .25s ease both;}
.pg.on > *:nth-child(2){animation-delay:.04s}
.pg.on > *:nth-child(3){animation-delay:.08s}
.pg.on > *:nth-child(4){animation-delay:.12s}
.pg.on > *:nth-child(5){animation-delay:.16s}

/* ══ LAYOUT ══ */
#shell{display:flex;min-height:100vh;}
#sidebar{width:232px;background:var(--bg2);border-right:1px solid var(--bdr);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0;transition:width var(--transition),background var(--transition);}
#main-area{flex:1;overflow-y:auto;min-height:100vh;transition:background var(--transition);}
.sb-logo{padding:20px 18px 10px;}
.sb-ey{font-size:9px;letter-spacing:.22em;color:var(--acc2);text-transform:uppercase;margin-bottom:2px;font-weight:600;}
.sb-wm{font-size:16px;font-weight:800;font-family:var(--font-display);color:var(--tx);letter-spacing:-.01em;line-height:1.2;}
.sb-clk{font-size:11px;color:var(--tx4);margin-top:3px;font-variant-numeric:tabular-nums;}
.sb-pill{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:3px 10px;border-radius:20px;font-size:9px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;}
.sb-pill.adm{background:var(--admbg);border:1px solid var(--admbdr);color:var(--adm);}
.sb-pill.emp{background:rgba(61,214,104,.1);border:1px solid rgba(61,214,104,.25);color:var(--gl);}
.sb-nav{padding:4px 10px;flex:1;overflow-y:auto;}
.nb{width:100%;display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;border:none;background:none;color:var(--tx3);cursor:pointer;text-align:left;font-size:12px;font-weight:500;margin-bottom:2px;border-left:2px solid transparent;transition:all var(--transition);}
.nb:hover{color:var(--tx2);background:rgba(255,255,255,.04);}
.nb.on{background:rgba(74,133,212,.1);color:var(--acc2);border-left-color:var(--acc);font-weight:600;}
.nb.an.on{background:rgba(139,92,246,.1);color:var(--adm);border-left-color:var(--adm);}
.nb-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
.sb-div{height:1px;background:var(--bdr);margin:6px 10px;}
.sb-foot{padding:10px 14px;border-top:1px solid var(--bdr);}
.sb-ui{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:7px 10px;border-radius:10px;background:var(--bg3);border:1px solid var(--bdr);cursor:pointer;transition:all var(--transition);}
.sb-ui:hover{border-color:var(--bdr2);}
.sb-name{font-size:11px;color:var(--tx);font-weight:600;line-height:1.3;}
.sb-role{font-size:9px;color:var(--tx4);}
.btn-so{width:100%;background:rgba(196,32,32,.08);border:1px solid rgba(196,32,32,.2);border-radius:8px;padding:8px;color:var(--rl);font-size:11px;cursor:pointer;transition:all var(--transition);font-weight:500;}
.btn-so:hover{background:rgba(196,32,32,.15);border-color:rgba(196,32,32,.4);}

/* ══ PAGES ══ */
.pg{padding:28px 32px;display:none;}
.pg.on{display:block;animation:fadeIn .2s ease;}
.pg-ey{font-size:10px;color:var(--acc2);letter-spacing:.16em;text-transform:uppercase;margin-bottom:4px;font-weight:600;}
.pg-ti{font-size:26px;font-weight:800;font-family:var(--font-display);color:var(--tx);letter-spacing:-.02em;}
.pg-sub{font-size:12px;color:var(--tx3);margin-top:3px;}
.pg-hd{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;}

/* ══ CARDS ══ */
.cd{background:var(--bg3);border:1px solid var(--bdr);border-radius:14px;transition:border-color var(--transition);}
.cd:hover{border-color:var(--bdr2);}
.cdp{padding:18px 22px;}

/* ══ BADGES ══ */
.bx{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;border:1px solid;}
.bx.sm{padding:2px 7px;font-size:10px;}
.bd{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0;}
.bx.present{background:var(--gbg);border-color:var(--gbd);color:var(--gl);}
.bx.present .bd{background:var(--gl);}
.bx.remote{background:var(--bbg);border-color:var(--bbd);color:var(--bl);}
.bx.remote .bd{background:var(--bl);}
.bx.absent{background:var(--rbg);border-color:var(--rbd);color:var(--rl);}
.bx.absent .bd{background:var(--rl);}
.bx.leave{background:var(--abg);border-color:var(--abd);color:var(--al);}
.bx.leave .bd{background:var(--al);}
.bx.checkedin{background:var(--tbg);border-color:var(--tbd);color:#3DD8B0;}
.bx.checkedin .bd{background:var(--t);}
.bx.unset{background:var(--grbg);border-color:var(--grbd);color:var(--gr);}
.bx.unset .bd{background:var(--gr);}
.bx.admbx{background:var(--admbg);border-color:var(--admbdr);color:var(--adm);}
.bx.admbx .bd{background:var(--adm);}

/* ══ BUTTONS ══ */
.btn{padding:10px 18px;border:none;border-radius:10px;cursor:pointer;font-size:12px;font-weight:600;transition:all var(--transition);font-family:inherit;}
.btn:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn-g{background:var(--g);color:#fff;}
.btn-b{background:var(--b);color:#fff;}
.btn-gh{background:var(--bg4);border:1px solid var(--bdr2);color:var(--tx2);}
.btn-gh:hover{border-color:var(--bdr3);}
.btn-sm{padding:6px 12px;font-size:11px;}
.btn-adm{background:var(--adm);color:#fff;}

/* ══ GRID ══ */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.fxb{display:flex;align-items:center;justify-content:space-between;}
.mb8{margin-bottom:8px;}.mb12{margin-bottom:12px;}.mb14{margin-bottom:14px;}
.mb16{margin-bottom:16px;}.mb20{margin-bottom:20px;}.mb24{margin-bottom:24px;}

/* ══ FORMS ══ */
.fl{margin-bottom:14px;}
.fl-lb{font-size:10px;color:var(--tx3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;font-weight:600;}
.fi{width:100%;background:var(--bg4);border:1px solid var(--bdr2);border-radius:9px;padding:9px 13px;color:var(--tx);font-size:13px;font-family:inherit;outline:none;transition:border-color var(--transition),box-shadow var(--transition);}
.fi:focus{border-color:var(--acc2);box-shadow:0 0 0 3px rgba(74,133,212,.15);}
select.fi{appearance:none;}

/* ══ STAT CARDS ══ */
.sc{padding:16px 20px;}
.sc-lb{font-size:9px;color:var(--tx4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;font-weight:600;}
.sc-v{font-size:28px;font-weight:800;font-family:var(--font-display);animation:countUp .4s ease both;}
.sc-s{font-size:10px;color:var(--tx3);margin-top:4px;}

/* ══ TABLES ══ */
.th{display:grid;padding:10px 18px;border-bottom:1px solid var(--bdr);font-size:9px;color:var(--tx4);letter-spacing:.1em;text-transform:uppercase;font-weight:600;}
.tr{display:grid;padding:12px 18px;border-bottom:1px solid var(--bdr);align-items:center;cursor:pointer;transition:background var(--transition);}
.tr:hover{background:var(--bg4);}
.tr:last-child{border-bottom:none;}

/* ══ PROGRESS ══ */
.pt{height:7px;border-radius:4px;background:var(--bdr2);overflow:hidden;}
.pf{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1);}

/* ══ DAY STRIP ══ */
.ds{display:flex;gap:8px;}
.dc{flex:1;text-align:center;}
.dlb{font-size:9px;color:var(--tx4);margin-bottom:3px;font-weight:500;}
.ddw{height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;border:1px solid;transition:all var(--transition);}
.ddw:hover{transform:scale(1.1);}
.dot{width:7px;height:7px;border-radius:50%;}
.dn{font-size:9px;color:var(--tx3);margin-top:3px;}
.isd .ddw{border-color:var(--acc2)!important;box-shadow:0 0 0 2px var(--acc);}
.ds-present{background:var(--gbg);border-color:var(--gbd);}
.ds-present .dot{background:var(--gl);}
.ds-remote{background:var(--bbg);border-color:var(--bbd);}
.ds-remote .dot{background:var(--bl);}
.ds-absent{background:var(--rbg);border-color:var(--rbd);}
.ds-absent .dot{background:var(--rl);}
.ds-leave{background:var(--abg);border-color:var(--abd);}
.ds-leave .dot{background:var(--al);}
.ds-checkedin{background:var(--tbg);border-color:var(--tbd);}
.ds-checkedin .dot{background:var(--t);}
.ds-unset{background:var(--grbg);border-color:var(--grbd);}
.ds-unset .dot{background:var(--gr);}

/* ══ LOCATION BTN ══ */
.lb{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;cursor:pointer;text-align:left;transition:all var(--transition);width:100%;}
.lb:hover,.lb.sel{background:#101C30;border-color:var(--acc);}
.lb-ck{margin-left:auto;color:var(--acc2);display:none;}
.lb.sel .lb-ck{display:block;}

/* ══ MODAL ══ */
#ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px);}
#ov.open{display:flex;animation:fadeIn .15s ease;}
.mb{background:var(--bg3);border:1px solid var(--bdr2);border-radius:18px;padding:28px 32px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 40px 100px rgba(0,0,0,.8);animation:scaleIn .2s ease;}
.mb.wide{max-width:720px;}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.mt{font-size:17px;font-weight:700;color:var(--tx);font-family:var(--font-display);}
.mc{background:var(--bg4);border:1px solid var(--bdr);color:var(--tx3);font-size:16px;cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all var(--transition);}
.mc:hover{background:var(--bg5);color:var(--tx);border-color:var(--bdr2);}

/* ══ LOGIN ══ */
#login-scr{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;}
#login-scr::before{content:'';position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(74,133,212,.1) 0%,transparent 65%);top:-180px;right:-120px;pointer-events:none;animation:fadeIn 1.2s ease;}
#login-scr::after{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,.07) 0%,transparent 65%);bottom:-100px;left:-100px;pointer-events:none;}
.lw{width:100%;max-width:440px;position:relative;z-index:1;animation:fadeInUp .5s ease;}
.lb-brand{text-align:center;margin-bottom:36px;}
.lb-ey{font-size:10px;letter-spacing:.3em;color:var(--acc2);text-transform:uppercase;margin-bottom:12px;font-weight:600;}
.lb-ti{font-size:38px;font-weight:800;font-family:var(--font-display);color:var(--tx);line-height:1.05;letter-spacing:-.02em;}
.lb-dt{font-size:12px;color:var(--tx4);margin-top:12px;}
.lbox{background:var(--bg2);border:1px solid var(--bdr);border-radius:20px;padding:30px;box-shadow:0 20px 80px rgba(0,0,0,.5);}
.ltabs{display:flex;gap:4px;margin-bottom:24px;background:var(--bg4);border-radius:12px;padding:4px;}
.ltab{flex:1;padding:9px;border:none;border-radius:9px;background:none;color:var(--tx3);font-size:12px;cursor:pointer;transition:all var(--transition);font-family:inherit;font-weight:500;}
.ltab.on{background:var(--bg2);color:var(--tx);font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.l-err{font-size:11px;color:var(--rl);text-align:center;margin-top:10px;min-height:16px;font-weight:500;}
.l-hint{font-size:10px;color:var(--tx4);text-align:center;margin-top:16px;line-height:1.8;}
.l-hint b{color:var(--acc2);font-weight:700;}

/* ══ PIN PAD ══ */
.pin-dots{display:flex;justify-content:center;gap:12px;margin:18px 0 22px;}
.pdot{width:15px;height:15px;border-radius:50%;border:2px solid var(--bdr2);transition:all .2s;}
.pdot.on{background:var(--acc2);border-color:var(--acc2);box-shadow:0 0 10px var(--acc2)88;transform:scale(1.15);}
.ppad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.ppb{padding:16px;background:var(--bg4);border:1px solid var(--bdr);border-radius:12px;color:var(--tx);font-size:18px;font-family:var(--font-display);font-weight:700;cursor:pointer;transition:all var(--transition);}
.ppb:hover{background:var(--bg5);border-color:var(--bdr2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.2);}
.ppb:active{transform:scale(.93);}
.ppb.del{font-size:16px;color:var(--tx3);}

/* ══ PICK CARDS ══ */

// ═══════════════════════════ AUDIT LOG
function nowFull(){var n=new Date();return n.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})+" "+pad(n.getHours())+":"+pad(n.getMinutes())+":"+pad(n.getSeconds());}
function addLog(action, empId, date, changes){
  var emp=EMPS.find(function(e){return e.id===empId;})||{name:"Unknown"};

    ts:nowFull(),
    tsRaw:Date.now(),
    adminId:CU?CU.id:"?",
    adminName:CU?CU.name:"System",
    empId:empId,
    empName:emp.name,
    date:date||TODAY,
    action:action,
    changes:changes||[]
  });
  // cap at 500 entries
  if(AUDIT_LOG.length>500)AUDIT_LOG.pop();
}

// ═══════════════════════════ UTILS
function nowT(){var n=new Date();return pad(n.getHours())+":"+pad(n.getMinutes());}
function pad(x){return String(x).padStart(2,"0");}
function calcH(ci,co){if(!ci||!co)return null;var a=ci.split(":"),b=co.split(":");var m=(+b[0]*60+ +b[1])-(+a[0]*60+ +a[1]);return m>0?(Math.floor(m/60)+"h "+(m%60)+"m"):null;}
function fmtD(s){if(!s)return"";return new Date(s).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});}
function pctC(p){return p>=80?"#3DD668":p>=60?"#F0A830":"#F06060";}
function last7(){var d=[],dt=new Date();while(d.length<7){if(dt.getDay()!==0&&dt.getDay()!==6)d.unshift(dt.toISOString().split("T")[0]);dt.setDate(dt.getDate()-1);}return d;}
function last22(){var d=[],dt=new Date();while(d.length<22){if(dt.getDay()!==0&&dt.getDay()!==6)d.unshift(dt.toISOString().split("T")[0]);dt.setDate(dt.getDate()-1);}return d;}
function getTR(eid){return(ATT[eid]&&ATT[eid][TODAY])||{st:"unset",loc:null,in:null,out:null,notes:""};}
function getStats(eid){
  var vs=ATT[eid]?Object.values(ATT[eid]):[];
  var p=0,r=0,a=0,l=0,t=0;
  vs.forEach(function(v){if(v.st==="unset")return;t++;if(v.st==="present"||v.st==="checkedin")p++;else if(v.st==="remote")r++;else if(v.st==="absent")a++;else if(v.st==="leave")l++;});
  return{p:p,r:r,a:a,l:l,t:t,pct:t?Math.round(((p+r)/t)*100):0};
}
function setATT(eid,date,patch){
  if(!ATT[eid])ATT[eid]={};
  var cur=ATT[eid][date]||{st:"unset",loc:null,in:null,out:null,notes:""};

}

// ═══════════════════════════ BUILD ATT DATA
function buildATT(){
  ATT={};
  EMPS.forEach(function(emp){
    ATT[emp.id]={};
    for(var i=29;i>=1;i--){
      var dt=new Date();dt.setDate(dt.getDate()-i);
      var k=dt.toISOString().split("T")[0];
      if(dt.getDay()===0||dt.getDay()===6)continue;
      var rnd=Math.random();
      var loc=emp.locs[Math.floor(Math.random()*emp.locs.length)];
      var hi=8+Math.floor(Math.random()*2),mi=Math.random()>.5?"00":"30";
      var ho=17+Math.floor(Math.random()*3),mo=Math.random()>.5?"00":"30";
      var ci=pad(hi)+":"+mi, co=ho+":"+mo;
      ATT[emp.id][k]=rnd<.6?{st:"present",loc:loc,in:ci,out:co,notes:""}:rnd<.75?{st:"remote",loc:"L5",in:ci,out:co,notes:""}:rnd<.85?{st:"absent",loc:null,in:null,out:null,notes:"Unplanned"}:rnd<.93?{st:"leave",loc:null,in:null,out:null,notes:"Annual leave"}:{st:"present",loc:loc,in:ci,out:null,notes:""};
    }
    ATT[emp.id][TODAY]={st:"unset",loc:null,in:null,out:null,notes:""};
  });
}

}

function buildPinDots(){
  var h="";for(var i=0;i<4;i++)h+='<div class="pdot" id="pd'+i+'"></div>';
  el("pin-dots").innerHTML=h;
}
function buildPinPad(){
  var h="";
  [[1,2,3],[4,5,6],[7,8,9]].forEach(function(row){
    row.forEach(function(n){h+='<button class="ppb" onclick="pinPress('+n+')">'+n+'</button>';});
  });
  h+='<button class="ppb" style="visibility:hidden;"></button>';
  h+='<button class="ppb" onclick="pinPress(0)">0</button>';
  h+='<button class="ppb del" onclick="pinDel()">&#9003;</button>';
  el("ppad").innerHTML=h;
}
function resetPin(){pinVal="";updDots();el("pin-err").textContent="";}
function updDots(){for(var i=0;i<4;i++){var d=el("pd"+i);if(d)d.className="pdot"+(i<pinVal.length?" on":"");}}
function pinPress(n){
  if(pinVal.length>=4)return;
  pinVal+=n;updDots();
  if(pinVal.length===4)setTimeout(tryPin,120);
}
function pinDel(){if(pinVal.length>0){pinVal=pinVal.slice(0,-1);updDots();}}
function tryPin(){
  var empId=el("pin-sel").value;
  if(!empId){el("pin-err").textContent="Please select your name first.";pinVal="";updDots();return;}
  var emp=EMPS.find(function(e){return e.id===empId;});
  if(emp&&String(emp.pin)===String(pinVal)){doLogin(emp);}
  else{el("pin-err").textContent="Incorrect PIN. Please try again.";pinVal="";updDots();}
}

function chgPin(){
  var cur=el("pc-cur").value, nw=el("pc-new").value, cnf=el("pc-cnf").value;

  if(String(cur)!==String(CU.pin)){msg.style.color="var(--rl)";msg.textContent="Current PIN is incorrect.";return;}
  if(nw.length!==4||!/^\d+$/.test(nw)){msg.style.color="var(--rl)";msg.textContent="New PIN must be exactly 4 digits.";return;}
  if(nw!==cnf){msg.style.color="var(--rl)";msg.textContent="PINs do not match.";return;}
  CU.pin=nw;var emp=EMPS.find(function(e){return e.id===CU.id;});if(emp)emp.pin=nw;
  msg.style.color="#3DD668";msg.textContent="PIN updated successfully.";
  el("pc-cur").value="";el("pc-new").value="";el("pc-cnf").value="";
  setTimeout(function(){if(msg)msg.textContent="";},3000);

function saveAtt(eid,dt){
  var before=(ATT[eid]&&ATT[eid][dt])?Object.assign({},ATT[eid][dt]):{st:"unset",loc:null,in:null,out:null,notes:""};
  var nst=el("af-st").value, nloc=el("af-loc").value||null, nin=el("af-in").value||null, nout=el("af-out").value||null, nnotes=el("af-notes").value;

  if(before.st!==nst)changes.push({field:"Status",from:SCFG[before.st]?SCFG[before.st].lb:"—",to:SCFG[nst]?SCFG[nst].lb:nst});
  if(before.loc!==nloc){var fl=LOCS.find(function(l){return l.id===before.loc;}),tl=LOCS.find(function(l){return l.id===nloc;});changes.push({field:"Location",from:fl?fl.name:"—",to:tl?tl.name:"—"});}
  if(before.in!==nin)changes.push({field:"Check In",from:before.in||"—",to:nin||"—"});
  if(before.out!==nout)changes.push({field:"Check Out",from:before.out||"—",to:nout||"—"});
  if(before.notes!==(nnotes||""))changes.push({field:"Notes",from:before.notes||"—",to:nnotes||"—"});

function deleteEmp(eid){

// ═══════════════════════════ REPORTS ENGINE
// Helper: get all working days between two dates
function getDaysInRange(from,to){
  var days=[],dt=new Date(from),end=new Date(to);
  while(dt<=end){if(dt.getDay()!==0&&dt.getDay()!==6)days.push(dt.toISOString().split("T")[0]);dt.setDate(dt.getDate()+1);}
  return days;
}
// Build flat rows for given employees + days
function buildRows(empList,days){
  var rows=[];
  empList.forEach(function(emp){
    days.forEach(function(d){
      var r=(ATT[emp.id]&&ATT[emp.id][d])||{st:"unset",loc:null,in:null,out:null,notes:""};
      var loc=LOCS.find(function(l){return l.id===r.loc;});
      var hrs=calcH(r.in,r.out);
      rows.push({
        empId:emp.id,empName:emp.name,role:emp.role,dept:emp.dept,
        date:d,dateLabel:fmtD(d),
        status:SCFG[r.st]?SCFG[r.st].lb:"Not Set",
        locId:r.loc,locName:loc?loc.name:"—",
        checkIn:r.in||"—",checkOut:r.out||"—",
        hours:hrs||"—",notes:r.notes||""
      });
    });
  });
  return rows;
}

// ── PDF Export
function exportPDF(mode,empList,days,title){
  var jsPDFLib=window.jspdf?window.jspdf.jsPDF:window.jsPDF;
  if(!jsPDFLib){showToast("PDF library not loaded yet, try again",true);return;}
  var doc=new jsPDFLib({orientation:"landscape",unit:"mm",format:"a4"});
  var rows=buildRows(empList,days);

  // Title block
  doc.setFontSize(18);doc.setFont("helvetica","bold");
  doc.text("ATTENDANCE MANAGEMENT SYSTEM",14,16);
  doc.setFontSize(11);doc.setFont("helvetica","normal");
  doc.text("Attendance Report — "+title,14,23);
  doc.setFontSize(9);doc.text("Generated: "+new Date().toLocaleString("en-GB"),14,29);
  doc.text("Period: "+fmtD(days[0])+" to "+fmtD(days[days.length-1]),14,34);

  var columns,tableRows;
  if(mode==="employee"){
    // Group by employee
    var grouped={};
    rows.forEach(function(r){if(!grouped[r.empId])grouped[r.empId]=[];grouped[r.empId].push(r);});
    var allRows=[];
    Object.keys(grouped).forEach(function(eid){
      var emp=EMPS.find(function(e){return e.id===eid;});
      // Section header row
      allRows.push([{content:emp?emp.name+" — "+emp.role+" / "+emp.dept:"",colSpan:7,styles:{fillColor:[20,24,39],textColor:[180,170,160],fontStyle:"bold"}}]);
      grouped[eid].forEach(function(r){allRows.push([r.dateLabel,r.status,r.locName,r.checkIn,r.checkOut,r.hours,r.notes]);});
    });
    columns=["Date","Status","Location","Check In","Check Out","Hours","Notes"];
    tableRows=allRows;
  } else if(mode==="location"){
    var grpL={};
    rows.forEach(function(r){if(!grpL[r.locId||"none"])grpL[r.locId||"none"]=[];grpL[r.locId||"none"].push(r);});
    var allRowsL=[];
    Object.keys(grpL).forEach(function(lid){
      var loc=LOCS.find(function(l){return l.id===lid;});
      allRowsL.push([{content:(loc?loc.icon+" "+loc.name:"No Location Assigned"),colSpan:7,styles:{fillColor:[20,24,39],textColor:[180,170,160],fontStyle:"bold"}}]);
      grpL[lid].forEach(function(r){allRowsL.push([r.empName,r.dateLabel,r.status,r.checkIn,r.checkOut,r.hours,r.notes]);});
    });
    columns=["Employee","Date","Status","Check In","Check Out","Hours","Notes"];
    tableRows=allRowsL;
  } else {
    // Date-wise
    var grpD={};
    rows.forEach(function(r){if(!grpD[r.date])grpD[r.date]=[];grpD[r.date].push(r);});
    var allRowsD=[];
    Object.keys(grpD).sort().forEach(function(d){
      allRowsD.push([{content:fmtD(d),colSpan:7,styles:{fillColor:[20,24,39],textColor:[180,170,160],fontStyle:"bold"}}]);
      grpD[d].forEach(function(r){allRowsD.push([r.empName,r.role,r.status,r.locName,r.checkIn,r.checkOut,r.hours]);});
    });
    columns=["Employee","Role","Status","Location","Check In","Check Out","Hours"];
    tableRows=allRowsD;
  }

  doc.autoTable({
    head:[columns],body:tableRows,startY:40,
    styles:{fontSize:8,cellPadding:2.5,font:"helvetica",textColor:[200,200,195]},
    headStyles:{fillColor:[29,79,216],textColor:[255,255,255],fontStyle:"bold",fontSize:8},
    alternateRowStyles:{fillColor:[15,17,25]},
    tableLineColor:[30,33,50],tableLineWidth:0.2,
    margin:{left:14,right:14},
    didDrawPage:function(data){
      doc.setFontSize(8);doc.setTextColor(100);
      doc.text("Page "+data.pageNumber,doc.internal.pageSize.width-20,doc.internal.pageSize.height-8);
    }
  });
  doc.save("nexus-attendance-"+mode+"-"+TODAY+".pdf");
  showToast("PDF exported");
}

// ── Excel Export
function exportExcel(mode,empList,days,title){
  if(!window.XLSX){showToast("Excel library not loaded yet, try again",true);return;}
  var rows=buildRows(empList,days);
  var wb=XLSX.utils.book_new();

  if(mode==="employee"){
    var grouped={};
    rows.forEach(function(r){if(!grouped[r.empId])grouped[r.empId]=[];grouped[r.empId].push(r);});
    Object.keys(grouped).forEach(function(eid){
      var emp=EMPS.find(function(e){return e.id===eid;});
      var shName=(emp?emp.name:"Emp").replace(/[\\\/\?\*\[\]:]/g,"").slice(0,28);
      var wsData=[["Date","Status","Location","Check In","Check Out","Hours","Notes"]];
      grouped[eid].forEach(function(r){wsData.push([r.dateLabel,r.status,r.locName,r.checkIn,r.checkOut,r.hours,r.notes]);});
      XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(wsData),shName);
    });
  } else if(mode==="location"){
    var wsData=[["Location","Employee","Date","Status","Check In","Check Out","Hours","Notes"]];
    rows.forEach(function(r){wsData.push([r.locName,r.empName,r.dateLabel,r.status,r.checkIn,r.checkOut,r.hours,r.notes]);});
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(wsData),"By Location");
  } else {
    var wsData=[["Date","Employee","Role","Department","Status","Location","Check In","Check Out","Hours","Notes"]];
    rows.forEach(function(r){wsData.push([r.dateLabel,r.empName,r.role,r.dept,r.status,r.locName,r.checkIn,r.checkOut,r.hours,r.notes]);});
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(wsData),"By Date");
  }
  // Summary sheet
  var sumData=[["Report Summary"],["Title",title],["Generated",new Date().toLocaleString("en-GB")],["Period",fmtD(days[0])+" to "+fmtD(days[days.length-1])],["Employees",empList.length],["Working Days",days.length],[],["Employee","Rate %","Present","Remote","Absent","Leave"]];
  empList.forEach(function(emp){var s=getStats(emp.id);sumData.push([emp.name,s.pct+"%",s.p,s.r,s.a,s.l]);});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(sumData),"Summary");
  XLSX.writeFile(wb,"nexus-attendance-"+mode+"-"+TODAY+".xlsx");
  showToast("Excel exported");
}

// ── Reports UI builder (shared between admin and employee)
function buildReportUI(pgEl,empList,isAdmin){
  var rangeStart=last22()[0],rangeEnd=TODAY;
  var defPeriod="week";
  function getSelDays(){
    var p=el("rpt-period")?el("rpt-period").value:"week";
    var df=el("rpt-from")?el("rpt-from").value:rangeStart;
    var dt=el("rpt-to")?el("rpt-to").value:rangeEnd;
    if(p==="week")return last7();
    if(p==="month")return last22();
    return getDaysInRange(df||rangeStart,dt||rangeEnd);
  }
  function getSelEmps(){
    if(!isAdmin)return empList;
    var ef=el("rpt-emp")?el("rpt-emp").value:"all";
    if(ef==="all")return empList;
    return empList.filter(function(e){return e.id===ef;});
  }
  function getSelLocs(){
    if(!isAdmin)return null;
    return el("rpt-loc")?el("rpt-loc").value:"all";
  }
  function refresh(){
    var days=getSelDays();
    var emps=getSelEmps();
    var locFilt=getSelLocs();
    var rows=buildRows(emps,days);
    if(locFilt&&locFilt!=="all")rows=rows.filter(function(r){return r.locId===locFilt;});

    // Summary stats
    var tot={p:0,r:0,a:0,l:0,t:0};
    rows.forEach(function(r){
      if(r.status==="Not Set")return;tot.t++;
      if(r.status==="Present"||r.status==="Checked In")tot.p++;
      else if(r.status==="Remote")tot.r++;
      else if(r.status==="Absent")tot.a++;
      else if(r.status==="On Leave")tot.l++;
    });
    var sc=el("rpt-summary");
    if(sc)sc.innerHTML=[
      {lb:"Present",v:tot.p,c:"#3DD668"},{lb:"Remote",v:tot.r,c:"#5B8EF8"},
      {lb:"Absent",v:tot.a,c:"#F06060"},{lb:"On Leave",v:tot.l,c:"#F0A830"}
    ].map(function(s){
      var pct=tot.t?Math.round(s.v/tot.t*100):0;
      return '<div class="cd sc"><div class="sc-lb">'+s.lb+'</div><div class="sc-v" style="color:'+s.c+';">'+s.v+'</div><div class="pt" style="margin-top:8px;"><div class="pf" style="width:'+pct+'%;background:'+s.c+';"></div></div><div class="sc-s">'+pct+'%</div></div>';
    }).join("");

    // Table

    var rptRows=rows;
    var hdr,rowFn;
    if(mode==="employee"){
      hdr=["Employee","Date","Status","Location","Check In","Check Out","Hours"];

      rptRows=rows.slice().sort(function(a,b){return (a.locName||"").localeCompare(b.locName||"");});
    } else {

    tc.innerHTML=th+tbody;
  }

  var h='<div class="fxb mb24"><div><div class="pg-ey">'+(isAdmin?"Admin &middot; Analytics":"My Records")+'</div><div class="pg-ti">Attendance Reports</div></div></div>';

function saveLoc(id){
  var name=(el("lf-name")||{}).value||"";
  var addr=(el("lf-addr")||{}).value||"";
  var color=(el("lf-color-txt")||{}).value||"#4A90D9";
  var icon=(el("lf-icon")||{}).value||"🏢";
  var type=(el("lf-type")||{}).value||"office";
  if(!name.trim()){showToast("Location name is required",true);return;}
  var selEmps=[];
  document.querySelectorAll("#lf-emps .lb.sel").forEach(function(b){selEmps.push(b.getAttribute("data-eid"));});
  if(id){
    var idx=LOCS.findIndex(function(l){return l.id===id;});
    var prev=LOCS[idx]||{};var changes=[];
    if(prev.name!==name)changes.push({field:"Name",from:prev.name,to:name});
    if(prev.addr!==addr)changes.push({field:"Address",from:prev.addr,to:addr});
    if(prev.color!==color)changes.push({field:"Color",from:prev.color,to:color});
    if(idx>=0)LOCS[idx]=Object.assign({},LOCS[idx],{name:name,addr:addr,color:color,icon:icon,type:type});
    EMPS.forEach(function(e){
      var has=e.locs.indexOf(id)>=0;var should=selEmps.indexOf(e.id)>=0;
      if(should&&!has){e.locs.push(id);changes.push({field:"Assigned",from:"—",to:e.name});}
      if(!should&&has){e.locs=e.locs.filter(function(l){return l!==id;});changes.push({field:"Unassigned",from:e.name,to:"—"});}
    });
    if(changes.length)addLog("Location Edit — "+name,id?id:"?",null,changes);
    showToast("Location updated");
  } else {
    var newId="L"+(LOCS.length+Date.now()%1000);
    LOCS.push({id:newId,name:name,addr:addr,color:color,icon:icon,type:type});
    selEmps.forEach(function(eid){var e=EMPS.find(function(x){return x.id===eid;});if(e&&e.locs.indexOf(newId)<0)e.locs.push(newId);});
    addLog("Location Added",null,null,[{field:"Name",from:"—",to:name},{field:"Address",from:"—",to:addr}]);
    showToast("Location added");
  }
  closeMod();renderAdmLocs();
}
function confirmDeleteLoc(locId){
  var loc=LOCS.find(function(l){return l.id===locId;});if(!loc)return;
  var assigned=EMPS.filter(function(e){return e.locs.indexOf(locId)>=0;}).length;
  var h='<div style="font-size:13px;color:var(--tx2);line-height:1.7;margin-bottom:18px;">';
  h+='Are you sure you want to delete <strong style="color:var(--tx);">'+loc.icon+' '+loc.name+'</strong>?';
  if(assigned)h+='<div style="margin-top:10px;padding:10px 14px;background:#1A0808;border:1px solid #381818;border-radius:8px;font-size:12px;color:var(--rl);">&#9888; '+assigned+' employee(s) are assigned to this location. They will be unassigned automatically.</div>';
  h+='</div><div style="display:flex;gap:8px;">';
  h+='<button class="btn btn-gh" style="flex:1;" onclick="closeMod()">Cancel</button>';
  h+='<button class="btn btn-sm" style="flex:2;padding:10px;background:#300808;border:1px solid #601010;color:var(--rl);border-radius:10px;font-weight:600;font-size:12px;" onclick="deleteLoc(\''+locId+'\')">Delete Location</button>';
  h+='</div>';
  openMod("Delete Location",h);
}
function deleteLoc(locId){
  var loc=LOCS.find(function(l){return l.id===locId;});
  var locName=loc?loc.name:"Unknown";
  addLog("Location Deleted",null,null,[{field:"Location",from:locName,to:"Deleted"}]);
  LOCS=LOCS.filter(function(l){return l.id!==locId;});
  EMPS.forEach(function(e){e.locs=e.locs.filter(function(l){return l!==locId;});});
  EMPS.forEach(function(e){Object.values(ATT[e.id]||{}).forEach(function(r){if(r.loc===locId)r.loc=null;});});
  closeMod();showToast("Location deleted");renderAdmLocs();
}
function bulkAssign(action){
  var locId=(el("ba-loc")||{}).value;
  var empId=(el("ba-emp")||{}).value;
  var msg=el("ba-msg");
  if(!locId||!empId){msg.style.color="var(--rl)";msg.textContent="Select both location and employee.";return;}
  var emp=EMPS.find(function(e){return e.id===empId;});
  var loc=LOCS.find(function(l){return l.id===locId;});
  if(!emp||!loc)return;
  if(action==="add"){
    if(emp.locs.indexOf(locId)>=0){msg.style.color="var(--al)";msg.textContent=emp.name+" is already assigned here.";return;}
    emp.locs.push(locId);
    addLog("Location Assigned",empId,null,[{field:"Location",from:"—",to:loc.name}]);
    msg.style.color="var(--gl)";msg.textContent="&#10003; "+emp.name+" assigned to "+loc.name+".";
  } else {
    if(emp.locs.indexOf(locId)<0){msg.style.color="var(--al)";msg.textContent=emp.name+" is not assigned here.";return;}
    emp.locs=emp.locs.filter(function(l){return l!==locId;});
    addLog("Location Unassigned",empId,null,[{field:"Location",from:loc.name,to:"—"}]);
    msg.style.color="var(--rl)";msg.textContent=emp.name+" removed from "+loc.name+".";
  }
  setTimeout(function(){renderAdmLocs();},800);
}

  h+='<div class="fl"><div class="fl-lb">Email</div><input class="fi" type="email" id="ef-e" value="'+f.email+'"/></div>';
  h+='<div class="fl"><div class="fl-lb">Phone</div><input class="fi" id="ef-p" value="'+f.phone+'"/></div>';
  h+='<div class="fl"><div class="fl-lb">Join Date</div><input class="fi" type="date" id="ef-j" value="'+f.joined+'"/></div></div>';
  h+='<div class="fl"><div class="fl-lb">Reports To</div><select class="fi" id="ef-m">'+mopts+'</select></div>';
  h+='<div class="fl"><div class="fl-lb">Access Level</div><select class="fi" id="ef-ac">';
  h+='<option value="employee"'+(f.access==="employee"?" selected":"")+'>Employee &mdash; Own data only</option>';
  h+='<option value="admin"'+(f.access==="admin"?" selected":"")+'>Admin &mdash; Full access</option></select></div>';
  h+='<div class="fl"><div class="fl-lb" style="margin-bottom:7px;">Client Locations</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;" id="ef-locs">';
  LOCS.forEach(function(l,idx){
    h+='<button type="button" class="lb'+(f.locs.indexOf(l.id)>=0?" sel":"")+'" data-lid="'+l.id+'" onclick="toggleEfLoc(this)">';
    h+='<span>'+l.icon+'</span><span style="font-size:11px;color:var(--tx2);">'+l.name.split(" ").slice(0,2).join(" ")+'</span><span class="lb-ck" style="font-size:12px;">&#10003;</span></button>';
  });
  h+='</div></div>';
  h+='<div style="display:flex;gap:8px;margin-top:4px;">';
  h+='<button class="btn btn-gh" style="flex:1;" onclick="closeMod()">Cancel</button>';
  h+='<button class="btn btn-adm" style="flex:2;" onclick="saveEmp(\''+(f.id||"")+'\')">'+(isEdit?"Save Changes":"Add Employee")+'</button></div>';
  openMod(isEdit?"Edit &mdash; "+emp.name:"Add New Employee",h,true);
}
function toggleEfLoc(btn){btn.classList.toggle("sel");}
function saveEmp(id){
  var locs=[];
  document.querySelectorAll("#ef-locs .lb").forEach(function(b){if(b.classList.contains("sel"))locs.push(b.getAttribute("data-lid"));});
  var data={name:(el("ef-n")||{}).value||"",role:(el("ef-r")||{}).value||"",dept:(el("ef-d")||{}).value||"",email:(el("ef-e")||{}).value||"",phone:(el("ef-p")||{}).value||"",mgr:(el("ef-m")||{}).value||null,joined:(el("ef-j")||{}).value||TODAY,access:(el("ef-ac")||{}).value||"employee",locs:locs};
  if(!data.name.trim()){showToast("Name is required",true);return;}
  if(id){
    var idx=EMPS.findIndex(function(e){return e.id===id;});
    if(idx>=0){
      var prev=EMPS[idx];var changes=[];
      if(prev.name!==data.name)changes.push({field:"Name",from:prev.name,to:data.name});
      if(prev.role!==data.role)changes.push({field:"Role",from:prev.role,to:data.role});
      if(prev.dept!==data.dept)changes.push({field:"Dept",from:prev.dept,to:data.dept});
      if(prev.access!==data.access)changes.push({field:"Access",from:prev.access,to:data.access});
      EMPS[idx]=Object.assign({},EMPS[idx],data);
      if(changes.length)addLog("Employee Edit",id,null,changes);
    }
  } else {
    var cols=["#C9A96E","#7BA3A8","#A87BAA","#8BA87B","#A87B7B","#7B8EA8","#D4956A","#6AAED4"];
    var nid="E"+(EMPS.length+1);
    var av=data.name.trim().split(" ").map(function(n){return n[0];}).join("").toUpperCase().slice(0,2);
    EMPS.push(Object.assign({},data,{id:nid,av:av,color:cols[EMPS.length%cols.length],pin:"1234"}));
    ATT[nid]={};ATT[nid][TODAY]={st:"unset",loc:null,in:null,out:null,notes:""};
    addLog("Employee Added",nid,null,[{field:"Name",from:"—",to:data.name},{field:"Role",from:"—",to:data.role}]);
  }
  closeMod();showToast(id?"Employee updated":"Employee added (default PIN: 1234)");
  renderAdmEmps();
}

// ═══════════════════════════ AUDIT LOG PAGE
var logFilter={action:"",emp:"",search:""};
var LOG_ACTION_COLORS={
  "Attendance Edit":"#5B8EF8","Quick Mark":"#30C890",
  "Employee Edit":"#C084FC","Employee Added":"#3DD668","Employee Deleted":"#F06060",
  "Access Change":"#F0A830","PIN Reset":"#9CA3AF",
  "Location Edit":"#F0A830","Location Added":"#3DD668","Location Deleted":"#F06060",
  "Location Assigned":"#5B8EF8","Location Unassigned":"#F06060"
};
function renderAdmLog(){
  var logs=AUDIT_LOG;
  // Apply filters
  if(logFilter.action)logs=logs.filter(function(l){return l.action===logFilter.action;});
  if(logFilter.emp)logs=logs.filter(function(l){return l.empId===logFilter.emp||l.adminId===logFilter.emp;});
  if(logFilter.search){var q=logFilter.search.toLowerCase();logs=logs.filter(function(l){return l.action.toLowerCase().indexOf(q)>=0||l.empName.toLowerCase().indexOf(q)>=0||l.adminName.toLowerCase().indexOf(q)>=0||l.date.indexOf(q)>=0;});}

  var actions=["Attendance Edit","Quick Mark","Employee Edit","Employee Added","Employee Deleted","Access Change","PIN Reset","Location Edit","Location Added","Location Deleted","Location Assigned","Location Unassigned"];
  var h='<div class="fxb mb24"><div><div class="pg-ey">Admin &middot; Audit</div><div class="pg-ti">Change Log</div><div class="pg-sub">All admin-initiated changes tracked in real time</div></div>';
  h+='<div style="display:flex;gap:8px;align-items:center;">';
  h+='<div style="font-size:11px;color:var(--tx3);padding:6px 12px;background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;">'+AUDIT_LOG.length+' total entries</div>';
  h+='<button class="btn btn-gh btn-sm" onclick="AUDIT_LOG=[];renderAdmLog();" style="color:var(--rl);border-color:#3A1818;">Clear Log</button>';
  h+='</div></div>';

  // Filter bar
  h+='<div class="cd cdp mb20"><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">';
  h+='<div><div class="fl-lb">Filter by Action</div><select class="fi" onchange="logFilter.action=this.value;renderAdmLog();">';
  h+='<option value="">All Actions</option>';
  actions.forEach(function(a){h+='<option value="'+a+'"'+(logFilter.action===a?" selected":"")+'>'+a+'</option>';});
  h+='</select></div>';
  h+='<div><div class="fl-lb">Filter by Person</div><select class="fi" onchange="logFilter.emp=this.value;renderAdmLog();">';
  h+='<option value="">All Admins / Employees</option>';
  EMPS.filter(function(e){return e.access==="admin";}).forEach(function(e){h+='<option value="'+e.id+'"'+(logFilter.emp===e.id?" selected":"")+'>Admin: '+e.name+'</option>';});
  EMPS.forEach(function(e){h+='<option value="'+e.id+'"'+(logFilter.emp===e.id?" selected":"")+'>Emp: '+e.name+'</option>';});
  h+='</select></div>';
  h+='<div><div class="fl-lb">Search</div><input class="fi" placeholder="Search action, name, date..." value="'+logFilter.search+'" oninput="logFilter.search=this.value;renderAdmLog();"/></div>';
  h+='</div></div>';

  if(!logs.length){
    h+='<div class="cd cdp" style="text-align:center;padding:60px;">';
    h+='<div style="font-size:32px;margin-bottom:12px;">&#128221;</div>';
    h+='<div style="font-size:14px;color:var(--tx3);">'+(AUDIT_LOG.length?"No entries match the current filters.":"No changes have been logged yet.")+'</div>';
    h+='<div style="font-size:11px;color:var(--tx4);margin-top:6px;">Changes will appear here when admins edit attendance, employees, or locations.</div>';
    h+='</div>';
    el("pg-adm-log").innerHTML=h;
    return;
  }

  // Log entries
  h+='<div style="display:flex;flex-direction:column;gap:8px;">';
  logs.forEach(function(log){
    var actionColor=LOG_ACTION_COLORS[log.action]||"var(--acc2)";
    var adminEmp=EMPS.find(function(e){return e.id===log.adminId;});
    var targetEmp=EMPS.find(function(e){return e.id===log.empId;})||{name:log.empName,color:"#555",av:"?"};
    var isAttChange=log.action==="Attendance Edit"||log.action==="Quick Mark";

    h+='<div class="cd" style="overflow:hidden;">';
    // Top bar with color strip
    h+='<div style="height:3px;background:'+actionColor+';"></div>';
    h+='<div style="padding:14px 18px;">';
    h+='<div style="display:flex;align-items:flex-start;gap:12px;">';
    // Action badge + timestamp
    h+='<div style="flex-shrink:0;">';
    h+='<div style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:12px;background:'+actionColor+'18;border:1px solid '+actionColor+'44;margin-bottom:5px;">';
    h+='<div style="width:6px;height:6px;border-radius:50%;background:'+actionColor+';flex-shrink:0;"></div>';
    h+='<span style="font-size:10px;font-weight:600;color:'+actionColor+';">'+log.action+'</span></div>';
    h+='<div style="font-size:10px;color:var(--tx4);">'+log.ts+'</div></div>';
    // Main info
    h+='<div style="flex:1;">';
    // Who did what to whom
    h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;">';
    if(adminEmp)h+=mkAv(adminEmp,22);
    h+='<span style="font-size:12px;color:var(--tx2);font-weight:600;">'+(adminEmp?adminEmp.name:log.adminName)+'</span>';
    h+='<span style="font-size:11px;color:var(--tx4);">&#8594;</span>';
    if(log.empId&&log.empId!==log.adminId){h+=mkAv(targetEmp,22);h+='<span style="font-size:12px;color:var(--tx2);">'+log.empName+'</span>';}
    if(isAttChange&&log.date)h+='<span style="font-size:10px;color:var(--tx4);padding:2px 7px;background:var(--bg4);border-radius:6px;border:1px solid var(--bdr);">&#128197; '+fmtD(log.date)+'</span>';
    h+='</div>';
    // Changes table
    if(log.changes&&log.changes.length){
      h+='<div style="display:flex;flex-direction:column;gap:4px;">';
      log.changes.forEach(function(c){
        h+='<div style="display:flex;align-items:center;gap:8px;font-size:11px;">';
        h+='<span style="color:var(--tx4);width:90px;flex-shrink:0;font-size:10px;text-transform:uppercase;letter-spacing:.06em;">'+c.field+'</span>';
        h+='<span style="color:#F06060;background:#1A0808;border:1px solid #2A1010;padding:2px 8px;border-radius:6px;">'+c.from+'</span>';
        h+='<span style="color:var(--tx4);">&#8594;</span>';
        h+='<span style="color:#3DD668;background:#081508;border:1px solid #102010;padding:2px 8px;border-radius:6px;">'+c.to+'</span>';
        h+='</div>';
      });
      h+='</div>';
    }
    h+='</div>';
    h+='<div style="font-size:10px;color:var(--tx4);flex-shrink:0;">#'+log.id+'</div>';
    h+='</div></div></div>';
  });
  h+='</div>';
  el("pg-adm-log").innerHTML=h;
}

// ═══════════════════════════ MODAL
function openMod(ti,body,wide){
  el("mod-ti").textContent=ti;
  el("mod-bd").innerHTML=body;
  el("mod-box").className="mb"+(wide?" wide":"");
  el("ov").classList.add("open");
}
function closeMod(){el("ov").classList.remove("open");}

// ═══════════════════════════ APPEARANCE
var THEMES=["","ocean","forest","ember","violet","light"];
var THEME_NAMES=["🌑 Midnight","🌊 Ocean","🌿 Forest","🔥 Ember","🔮 Violet","☀️ Light"];
var FONTS=["jakarta","outfit","dm","mono","space"];
var FONT_NAMES=["Plus Jakarta","Outfit","DM Sans","DM Mono","Space Grotesk"];
var curTheme=0, curFont=0, isCompact=0;

function applyTheme(idx){
  curTheme=((idx%THEMES.length)+THEMES.length)%THEMES.length;
  document.documentElement.setAttribute("data-theme",THEMES[curTheme]);
  showToast("Theme: "+THEME_NAMES[curTheme]);
}
function cycleTheme(){applyTheme(curTheme+1);}
function applyFont(idx){
  curFont=((idx%FONTS.length)+FONTS.length)%FONTS.length;
  document.documentElement.setAttribute("data-font",FONTS[curFont]);
  showToast("Font: "+FONT_NAMES[curFont]);
}
function cycleFont(){applyFont(curFont+1);}
function toggleCompact(){
  isCompact=isCompact?0:1;
  document.documentElement.setAttribute("data-compact",isCompact);
}
function setTheme(name){
  var idx=THEMES.indexOf(name);if(idx>=0)applyTheme(idx);
}
function setFont(name){
  var idx=FONTS.indexOf(name);if(idx>=0)applyFont(idx);
}

// ═══════════════════════════ BOOT
buildATT();
initLogin();
</script>
